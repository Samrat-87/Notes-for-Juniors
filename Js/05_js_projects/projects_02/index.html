<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="/" aria-current="page">Home</a>
        <a href="https://samratsamanta.me/" target="_blank">Portfolio</a>
    </nav>
    <h1>BMI Calculator</h1>
    <form>
        <p><label for="Height in cm : "></label><input type="text" id="height" placeholder="Enter the Height"></p>
        <p><label for="weight in KG : "></label><input type="text" id="weight" placeholder="Enter the Weight"></p>
        <button>Calculate</button>
        <div id="result"></div>
        <div id="weigth-guideline">
            <h3>BMI Weight GuideLine</h3>
            <p>Under Weight = Less than 18.6</p>
            <p>Normal Weight = 18.6 to 24.9</p>
            <p>Over Weight = Greater than 24.9</p>
        </div>
    </form>
</body>
<script src="script.js"></script>
</html>
