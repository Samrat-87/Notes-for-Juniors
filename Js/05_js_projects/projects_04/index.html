    <div id="wrapper">
        <h1>Number Guessing Game</h1>
        <p>Try and guess a random number betwwen 1 to 100.</p>
        <p>You have to 10 attempts to guess the right Number.</p>
        <br>
        <form class="form">
            <label for="guessfield" id="guess">Guess a Number</label>
            <input type="text" id="guessfield" class="guessfield" placeholder="enter the number">
            <input type="submit" id="submit" value = "submit guess" class="guessSubmit">
        </form>
    </div>
